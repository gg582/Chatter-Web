<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chatter BBS</title>
    <meta name="description" content="Join Chatter BBS directly from a focused web terminal." />
    <link rel="stylesheet" href="./xterm.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-keyboard@3.8.132/build/css/index.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="join-screen" data-join-screen>
        <button class="join-button" data-join-button>Join</button>
      </section>

      <section class="terminal-screen" data-terminal-screen hidden>
        <div class="terminal-shell" data-terminal-container></div>

        <div class="bottom-bar">
          <button class="icon-button" data-keyboard-toggle aria-label="Toggle virtual keyboard">⌨</button>
          <button class="exit-button" data-exit-button>EXIT</button>
        </div>

        <section class="keyboard-panel" data-keyboard-panel hidden>
          <div class="simple-keyboard" data-keyboard></div>
        </section>
      </section>
    </main>

    <script src="./env.js" defer></script>
    <script src="./lib/xterm.js" defer></script>
    <script src="./lib/addon-fit.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-keyboard@3.8.132/build/index.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-keyboard-layouts@3.2.71/build/layouts/korean.min.js" defer></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
