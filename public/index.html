<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chatter BBS</title>
    <meta name="description" content="Join Chatter BBS directly from a focused web terminal." />
    <link rel="stylesheet" href="./xterm.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="join-screen" data-join-screen>
        <div class="join-card">
          <p class="eyebrow">Chatter BBS</p>
          <h1 class="title">Terminal Deck</h1>
          <p class="subtitle">Connect to Chatter with a focused SSH terminal.</p>
          <button class="join-button" data-join-button>Join</button>
        </div>
      </section>

      <section class="terminal-screen" data-terminal-screen hidden>
        <div class="terminal-card">
          <header class="terminal-header">
            <p class="terminal-title">Chatter BBS · TELNET</p>
            <div class="terminal-actions">
              <button class="action-button" data-join-again-button>Join</button>
              <button class="action-button exit-button" data-exit-button>Exit</button>
            </div>
          </header>
          <div class="terminal-shell" data-terminal-container></div>
        </div>
      </section>
    </main>

    <script src="./env.js" defer></script>
    <script src="./lib/xterm.js" defer></script>
    <script src="./lib/addon-fit.js" defer></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
