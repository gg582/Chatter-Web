<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chatter BBS</title>
    <meta name="description" content="Join Chatter BBS directly from a focused web terminal." />
    <link rel="stylesheet" href="./xterm.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="terminal-screen" data-terminal-screen>
        <div class="terminal-card">
          <header class="terminal-header">
            <p class="terminal-title">Chatter BBS · TELNET</p>
          </header>
          <div class="terminal-shell" data-terminal-container></div>
        </div>
      </section>
    </main>

    <script src="./env.js" defer></script>
    <script src="./lib/xterm.js" defer></script>
    <script src="./lib/addon-fit.js" defer></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
